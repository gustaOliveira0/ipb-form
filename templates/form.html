<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPB Guarapari — Cadastro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <h1>IPB Guarapari</h1>
    <p>Cadastro de Visitantes</p>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">Seus Dados</div>

      <form id="contactForm" action="/submit" method="POST" novalidate>
        <div class="form-group">
          <label for="name">Nome completo</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Seu nome"
            autocomplete="name"
            maxlength="120"
          >
          <p class="field-error" id="name-error">Por favor, informe seu nome.</p>
        </div>

        <div class="form-group">
          <label for="phone">Telefone / WhatsApp</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="(XX) XXXXX-XXXX"
            autocomplete="tel"
            maxlength="16"
            inputmode="numeric"
          >
          <p class="field-error" id="phone-error">Por favor, informe um telefone válido.</p>
        </div>

        <button type="submit" class="btn-submit">Enviar</button>
      </form>
    </div>
  </div>

  <footer>IPB Guarapari &copy; 2026</footer>

  <script>
    const phoneInput = document.getElementById('phone');

    phoneInput.addEventListener('input', function () {
      let v = this.value.replace(/\D/g, '').slice(0, 11);
      if (v.length === 0) {
        this.value = '';
        return;
      }
      let formatted = '';
      if (v.length <= 2) {
        formatted = '(' + v;
      } else if (v.length <= 7) {
        formatted = '(' + v.slice(0, 2) + ') ' + v.slice(2);
      } else if (v.length <= 11) {
        formatted = '(' + v.slice(0, 2) + ') ' + v.slice(2, 7) + '-' + v.slice(7);
      }
      this.value = formatted;
    });

    document.getElementById('contactForm').addEventListener('submit', function (e) {
      let valid = true;

      const name = document.getElementById('name');
      const nameError = document.getElementById('name-error');
      if (!name.value.trim()) {
        name.classList.add('error');
        nameError.style.display = 'block';
        valid = false;
      } else {
        name.classList.remove('error');
        nameError.style.display = 'none';
      }

      const phone = document.getElementById('phone');
      const phoneError = document.getElementById('phone-error');
      const digits = phone.value.replace(/\D/g, '');
      if (digits.length < 10) {
        phone.classList.add('error');
        phoneError.style.display = 'block';
        valid = false;
      } else {
        phone.classList.remove('error');
        phoneError.style.display = 'none';
      }

      if (!valid) e.preventDefault();
    });
  </script>
</body>
</html>
